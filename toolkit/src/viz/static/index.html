<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Cortex Viewer</title>
  <link rel="stylesheet" href="style.css" />
  <script src="vendor/cytoscape.min.js"></script>
</head>
<body>
  <main>
    <div id="cy"></div>
    <aside id="sidebar">
      <section id="s-head">
        <span class="brand">N1X&nbsp;Cortex</span>
        <input id="search" type="search" placeholder="Search notes…" />
      </section>
      <section id="s-info">
        <p id="info-empty" class="empty">Select a node to inspect it.</p>
        <div id="panel" class="hidden">
          <h2 id="p-title"></h2>
          <dl id="p-meta"></dl>
          <div id="p-links"></div>
        </div>
      </section>
      <section id="s-filter">
        <label class="colorby">Color by
          <select id="colorby">
            <option value="type">Type</option>
            <option value="status">Status</option>
            <option value="freshness">Freshness</option>
          </select>
        </label>
        <div id="legend"></div>
      </section>
      <section id="s-stats">
        <span id="stats" class="stats">loading…</span>
      </section>
    </aside>
  </main>
  <script src="app.js"></script>
</body>
</html>
