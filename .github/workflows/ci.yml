name: ci
on:
  push:
    branches: [main]
  pull_request:
jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]
    defaults:
      run:
        working-directory: toolkit
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: toolkit/package-lock.json
      # Retry: a transitive native postinstall (onnxruntime-node) downloads
      # binaries from nuget.org and occasionally times out on CI runners.
      - name: Install dependencies
        shell: bash
        run: |
          for i in 1 2 3; do
            npm ci && exit 0
            echo "npm ci failed (attempt $i), retrying in 15s..."
            sleep 15
          done
          exit 1
      - run: npm run lint
      - run: npm test
      - run: npm run build
