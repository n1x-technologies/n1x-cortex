name: ci
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]
    defaults:
      run:
        working-directory: toolkit
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: toolkit/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm test
      - run: npm run build
